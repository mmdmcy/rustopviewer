<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>RustOp Viewer</title>
  <style>
    :root {
      --bg-0: #03070d;
      --bg-1: #0b1521;
      --panel: rgba(8, 15, 24, 0.78);
      --panel-strong: rgba(11, 18, 30, 0.92);
      --border: rgba(148, 163, 184, 0.16);
      --ink: #edf4fb;
      --muted: #93a7bf;
      --ok: #4ade80;
      --warn: #f59e0b;
      --danger: #f87171;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.38);
      --radius-xl: 22px;
      --radius-lg: 16px;
      --radius-md: 13px;
      --font: "Segoe UI Variable Display", "SF Pro Display", "Aptos", sans-serif;
      --mono: "Cascadia Code", "SF Mono", "Consolas", monospace;
      --viewer-top-inset: 0px;
      --viewer-bottom-inset: 0px;
      --return-dock-stack-offset: 0px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    [hidden] {
      display: none !important;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(249, 115, 22, 0.18), transparent 24%),
        radial-gradient(circle at top right, rgba(59, 130, 246, 0.16), transparent 24%),
        linear-gradient(180deg, var(--bg-0), var(--bg-1));
      color: var(--ink);
      font-family: var(--font);
    }

    body {
      padding:
        calc(env(safe-area-inset-top) + 8px)
        8px
        calc(env(safe-area-inset-bottom) + 8px);
    }

    body.focus-mode {
      padding: 0;
      background: #000;
    }

    .page {
      min-height: calc(100svh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 16px);
    }

    body.focus-mode .page {
      min-height: 100svh;
    }

    .viewer {
      position: relative;
      min-height: inherit;
      border-radius: 0;
      overflow: hidden;
      border: 1px solid var(--border);
      background:
        radial-gradient(circle at top, rgba(37, 99, 235, 0.08), transparent 36%),
        linear-gradient(180deg, rgba(6, 11, 18, 0.98), rgba(3, 7, 13, 1));
      box-shadow: var(--shadow);
      user-select: none;
    }

    body.focus-mode .viewer {
      min-height: 100svh;
      border-radius: 0;
      border-left: 0;
      border-right: 0;
      border-top: 0;
      border-bottom: 0;
    }

    .viewer::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(transparent 97%, rgba(255, 255, 255, 0.04) 97%),
        linear-gradient(90deg, transparent 97%, rgba(255, 255, 255, 0.04) 97%);
      background-size: 20px 20px;
      opacity: 0.12;
      pointer-events: none;
    }

    .screen-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--viewer-top-inset) 0 var(--viewer-bottom-inset);
      touch-action: none;
    }

    body.focus-mode .screen-wrap {
      padding: var(--viewer-top-inset) 0 var(--viewer-bottom-inset);
    }

    .screen-pan {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      will-change: transform;
    }

    .screen {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      background: #000;
      border-radius: 0;
      object-fit: contain;
      pointer-events: none;
      transform-origin: center center;
      will-change: transform;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      background: linear-gradient(180deg, rgba(4, 7, 12, 0.62), rgba(4, 7, 12, 0.16));
      transition: opacity 180ms ease, visibility 180ms ease;
    }

    .overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .overlay-card {
      width: min(430px, 100%);
      padding: 18px 16px;
      border-radius: var(--radius-xl);
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: rgba(8, 15, 24, 0.82);
      text-align: center;
    }

    .overlay-card strong {
      display: block;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    .overlay-card span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.95rem;
    }

    .hud-top,
    .hud-bottom,
    .sheet,
    .return-dock {
      position: absolute;
      left: 10px;
      right: 10px;
      z-index: 4;
      touch-action: manipulation;
    }

    .hud-top {
      top: 10px;
      display: grid;
      gap: 10px;
    }

    .status-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 36px;
      padding: 8px 11px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.14);
      background: var(--panel);
      backdrop-filter: blur(12px);
      font-size: 0.84rem;
      white-space: nowrap;
    }

    .pill strong {
      font-weight: 700;
      color: var(--ink);
    }

    .pill.ok strong { color: var(--ok); }
    .pill.warn strong { color: var(--warn); }
    .pill.error strong { color: var(--danger); }

    .hud-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-start;
    }

    .chip,
    .action {
      appearance: none;
      border: 1px solid rgba(148, 163, 184, 0.14);
      background: linear-gradient(180deg, rgba(22, 34, 53, 0.94), rgba(11, 18, 29, 0.96));
      color: var(--ink);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .chip,
    .action,
    .text-box {
      touch-action: manipulation;
    }

    .chip {
      min-height: 38px;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 650;
      letter-spacing: 0.02em;
    }

    .chip.compact {
      min-width: 42px;
      padding-left: 10px;
      padding-right: 10px;
      text-align: center;
    }

    .hud-bottom {
      bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 10px;
    }

    body.focus-mode .hud-top {
      top: calc(env(safe-area-inset-top) + 10px);
    }

    body.focus-mode .hud-bottom {
      bottom: calc(env(safe-area-inset-bottom) + 10px);
    }

    .mode-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mode-bar .chip.active,
    .action.active {
      border-color: rgba(249, 115, 22, 0.5);
      background:
        linear-gradient(180deg, rgba(245, 158, 11, 0.24), rgba(249, 115, 22, 0.18)),
        linear-gradient(180deg, rgba(22, 34, 53, 0.94), rgba(11, 18, 29, 0.96));
    }

    .sheet {
      bottom: 58px;
      padding: 12px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: var(--panel-strong);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      display: none;
      gap: 12px;
      max-height: min(46svh, 410px);
      overflow: auto;
    }

    body.tools-open .sheet {
      display: grid;
    }

    body.focus-mode .sheet {
      left: 8px;
      right: 8px;
      bottom: calc(env(safe-area-inset-bottom) + 58px);
    }

    .toolbar-grid,
    .key-grid {
      display: grid;
      gap: 10px;
    }

    .toolbar-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .key-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .action {
      min-height: 48px;
      border-radius: var(--radius-md);
      padding: 11px 10px;
      font-weight: 650;
      letter-spacing: 0.02em;
    }

    .text-row {
      display: grid;
      gap: 10px;
      order: -1;
    }

    .text-box {
      width: 100%;
      min-height: 100px;
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.14);
      background: rgba(5, 10, 18, 0.98);
      color: var(--ink);
      padding: 13px;
      resize: vertical;
      font-size: 16px;
      line-height: 1.4;
      font-family: var(--mono);
    }

    .text-box::placeholder {
      color: #71859d;
    }

    body.ui-hidden .status-strip,
    body.ui-hidden .sheet,
    body.ui-hidden .hud-top {
      display: none !important;
    }

    body.ui-hidden .hud-bottom {
      left: 12px;
      right: 12px;
    }

    .return-dock {
      position: absolute;
      left: auto;
      right: 12px;
      bottom: calc(env(safe-area-inset-bottom) + 12px + var(--return-dock-stack-offset));
      z-index: 6;
      display: none;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: calc(100% - 24px);
    }

    body.ui-hidden .return-dock,
    body.focus-mode .return-dock,
    body.view-zoomed .return-dock,
    body.keyboard-open .return-dock {
      display: flex;
    }

    @media (min-width: 760px) {
      .toolbar-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .text-row {
        grid-template-columns: 1fr auto;
        align-items: start;
      }

      #sendTextBtn {
        min-width: 150px;
      }
    }

    @media (orientation: landscape) and (max-height: 430px) {
      body {
        padding:
          calc(env(safe-area-inset-top) + 4px)
          4px
          calc(env(safe-area-inset-bottom) + 4px);
      }

      .viewer {
        border-radius: 0;
      }

      .hud-top,
      .hud-bottom,
      .sheet {
        left: 6px;
        right: 6px;
      }

      .hud-top {
        top: 6px;
        gap: 6px;
      }

      .hud-bottom {
        bottom: 6px;
      }

      .pill {
        min-height: 32px;
        padding: 6px 10px;
        font-size: 0.78rem;
      }

      .chip {
        min-height: 34px;
        padding: 6px 10px;
        font-size: 0.82rem;
      }

      .sheet {
        bottom: 46px;
        gap: 8px;
        padding: 8px;
        max-height: min(48svh, 250px);
      }

      body.focus-mode .sheet {
        bottom: calc(env(safe-area-inset-bottom) + 46px);
      }

      .action {
        min-height: 40px;
        padding: 8px 9px;
        font-size: 0.83rem;
      }

      .text-box {
        min-height: 70px;
        padding: 10px 11px;
      }

      .return-dock {
        right: 8px;
        bottom: calc(env(safe-area-inset-bottom) + 8px + var(--return-dock-stack-offset));
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="viewer" id="frameSurface">
      <div class="screen-wrap">
        <div class="screen-pan" id="screenPan">
          <img class="screen" id="frameImage" alt="Live desktop stream">
        </div>
      </div>

      <div class="overlay" id="frameOverlay">
        <div class="overlay-card">
          <strong id="overlayTitle">Waiting for the laptop</strong>
          <span id="overlayMessage">Open the newest phone URL from the Windows app if this does not clear on its own.</span>
        </div>
      </div>

      <div class="hud-top">
        <div class="status-strip">
          <div class="pill warn" id="connectionPill"><strong>Connecting</strong><span id="connectionHint">Waiting for the server</span></div>
          <div class="pill" id="monitorPill"><strong>Monitor</strong><span id="monitorHint">Unknown</span></div>
          <div class="pill" id="framePill"><strong>Frame</strong><span id="frameHint">Pending</span></div>
        </div>
        <div class="hud-actions">
          <button class="chip" id="fullscreenBtn">Fill Screen</button>
          <button class="chip" id="keyboardBtn">Keyboard</button>
          <button class="chip compact" id="zoomOutBtn">-</button>
          <button class="chip compact" id="zoomResetBtn">1.0x</button>
          <button class="chip compact" id="zoomInBtn">+</button>
          <button class="chip" id="toolsToggleBtn">Tools</button>
          <button class="chip" id="uiToggleBtn">Hide UI</button>
        </div>
      </div>

      <div class="sheet" id="toolsSheet">
        <div class="toolbar-grid">
          <button class="action" data-shortcut="meta">Start</button>
          <button class="action" data-shortcut="alt+tab">Alt+Tab</button>
          <button class="action" data-shortcut="meta+r">Win+R</button>
          <button class="action" data-shortcut="control+c">Ctrl+C</button>
          <button class="action" data-shortcut="control+v">Ctrl+V</button>
          <button class="action" data-shortcut="control+x">Ctrl+X</button>
          <button class="action" data-shortcut="meta+d">Win+D</button>
          <button class="action" data-shortcut="alt+f4">Alt+F4</button>
        </div>

        <div class="key-grid">
          <button class="action" data-key="escape">Esc</button>
          <button class="action" data-key="tab">Tab</button>
          <button class="action" data-key="enter">Enter</button>
          <button class="action" data-key="backspace">Back</button>
          <button class="action" data-key="up_arrow">Up</button>
          <button class="action" data-key="left_arrow">Left</button>
          <button class="action" data-key="down_arrow">Down</button>
          <button class="action" data-key="right_arrow">Right</button>
          <button class="action" data-key="home">Home</button>
          <button class="action" data-key="end">End</button>
          <button class="action" data-key="page_up">PgUp</button>
          <button class="action" data-key="page_down">PgDn</button>
        </div>

        <div class="text-row">
          <textarea class="text-box" id="textInput" placeholder="Type text here" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" enterkeyhint="send"></textarea>
          <button class="action" id="sendTextBtn">Send Text</button>
        </div>
      </div>

      <div class="hud-bottom">
        <div class="mode-bar">
          <button class="chip active" id="directModeBtn">Direct</button>
          <button class="chip" id="dragModeBtn">Drag</button>
          <button class="chip" id="scrollModeBtn">Scroll</button>
        </div>
      </div>

      <div class="return-dock">
        <button class="chip" id="showUiBtn">Show UI</button>
        <button class="chip" id="quickKeyboardBtn">Keyboard</button>
        <button class="chip" id="resetViewBtn">Reset View</button>
        <button class="chip compact" id="quickZoomOutBtn">-</button>
        <button class="chip compact" id="quickZoomResetBtn">1.0x</button>
        <button class="chip compact" id="quickZoomInBtn">+</button>
        <button class="chip" id="exitFullscreenBtn">Exit Fill</button>
      </div>
    </section>
  </main>

  <script>
    const TOKEN_STORAGE_KEY = "rustopviewer-auth-token";
    const FRAME_INTERVAL_MS = 220;
    const STATUS_INTERVAL_MS = 1800;
    const MOVE_INTERVAL_MS = 40;
    const LONG_PRESS_MS = 520;
    const SCROLL_START_PX = 14;
    const SCROLL_STEP_PX = 24;

    const state = {
      token: "",
      dragMode: false,
      scrollMode: false,
      toolsOpen: false,
      uiHidden: false,
      focusMode: false,
      viewScale: 1,
      viewOffsetX: 0,
      viewOffsetY: 0,
      pointer: null,
      touchGesture: null,
      frameReady: false,
      frameObjectUrl: null,
      sendingText: false,
      textComposing: false,
      keyboardVisible: false,
      lastTextInputAt: 0
    };

    const body = document.body;
    const frameSurface = document.getElementById("frameSurface");
    const screenWrap = document.querySelector(".screen-wrap");
    const screenPan = document.getElementById("screenPan");
    const frameImage = document.getElementById("frameImage");
    const frameOverlay = document.getElementById("frameOverlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayMessage = document.getElementById("overlayMessage");
    const connectionPill = document.getElementById("connectionPill");
    const connectionHint = document.getElementById("connectionHint");
    const monitorPill = document.getElementById("monitorPill");
    const monitorHint = document.getElementById("monitorHint");
    const framePill = document.getElementById("framePill");
    const frameHint = document.getElementById("frameHint");
    const hudTop = document.querySelector(".hud-top");
    const hudBottom = document.querySelector(".hud-bottom");
    const returnDock = document.querySelector(".return-dock");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const keyboardBtn = document.getElementById("keyboardBtn");
    const zoomOutBtn = document.getElementById("zoomOutBtn");
    const zoomResetBtn = document.getElementById("zoomResetBtn");
    const zoomInBtn = document.getElementById("zoomInBtn");
    const toolsToggleBtn = document.getElementById("toolsToggleBtn");
    const uiToggleBtn = document.getElementById("uiToggleBtn");
    const showUiBtn = document.getElementById("showUiBtn");
    const quickKeyboardBtn = document.getElementById("quickKeyboardBtn");
    const resetViewBtn = document.getElementById("resetViewBtn");
    const quickZoomOutBtn = document.getElementById("quickZoomOutBtn");
    const quickZoomResetBtn = document.getElementById("quickZoomResetBtn");
    const quickZoomInBtn = document.getElementById("quickZoomInBtn");
    const exitFullscreenBtn = document.getElementById("exitFullscreenBtn");
    const toolsSheet = document.getElementById("toolsSheet");
    const directModeBtn = document.getElementById("directModeBtn");
    const dragModeBtn = document.getElementById("dragModeBtn");
    const scrollModeBtn = document.getElementById("scrollModeBtn");
    const textInput = document.getElementById("textInput");
    const sendTextBtn = document.getElementById("sendTextBtn");
    let viewportLayoutFrame = 0;

    boot();

    function boot() {
      state.token = resolveToken();
      bindControls();
      syncUiState();
      refreshStatus();
      refreshFrame();
      window.setInterval(refreshStatus, STATUS_INTERVAL_MS);
    }

    function bindControls() {
      frameImage.addEventListener("load", () => {
        state.frameReady = true;
        frameOverlay.classList.add("hidden");
        scheduleViewportLayout();
        applyViewTransform();
      });

      frameImage.addEventListener("error", () => {
        state.frameReady = false;
        if (!state.frameObjectUrl) {
          showOverlay("Image error", "Safari could not decode the latest frame.");
        }
      });

      document.addEventListener("fullscreenchange", () => {
        if (!document.fullscreenElement && state.focusMode) {
          state.focusMode = false;
          state.uiHidden = false;
          syncUiState();
        }
      });

      window.addEventListener("resize", scheduleViewportLayout);
      window.visualViewport?.addEventListener("resize", scheduleViewportLayout);
      window.visualViewport?.addEventListener("scroll", scheduleViewportLayout);

      [toolsSheet, textInput]
        .filter(Boolean)
        .forEach((element) => {
          ["pointerdown", "pointerup", "click"].forEach((eventName) => {
            element.addEventListener(eventName, (event) => {
              event.stopPropagation();
            });
          });
        });

      bindTap(fullscreenBtn, () => {
        toggleFocusMode();
      });

      bindTap(keyboardBtn, () => {
        toggleKeyboard();
      });

      bindTap(toolsToggleBtn, () => {
        dismissKeyboard(false);
        state.toolsOpen = !state.toolsOpen;
        state.keyboardVisible = false;
        syncUiState();
      });

      bindTap(zoomOutBtn, () => {
        zoomBy(-0.25);
      });

      bindTap(zoomInBtn, () => {
        zoomBy(0.25);
      });

      bindTap(zoomResetBtn, () => {
        resetZoom();
      });

      bindTap(uiToggleBtn, () => {
        state.uiHidden = !state.uiHidden;
        if (state.uiHidden) {
          dismissKeyboard(true);
          state.toolsOpen = false;
          state.keyboardVisible = false;
        }
        syncUiState();
      });

      bindTap(showUiBtn, () => {
        state.uiHidden = false;
        syncUiState();
      });

      bindTap(quickKeyboardBtn, () => {
        toggleKeyboard();
      });

      bindTap(resetViewBtn, () => {
        restoreDefaultView();
      });

      bindTap(quickZoomOutBtn, () => {
        zoomBy(-0.25);
      });

      bindTap(quickZoomInBtn, () => {
        zoomBy(0.25);
      });

      bindTap(quickZoomResetBtn, () => {
        resetZoom();
      });

      bindTap(exitFullscreenBtn, () => {
        if (state.focusMode) {
          toggleFocusMode(false);
        } else {
          state.uiHidden = false;
          syncUiState();
        }
      });

      bindTap(directModeBtn, () => {
        state.dragMode = false;
        state.scrollMode = false;
        syncUiState();
      });

      bindTap(dragModeBtn, () => {
        state.dragMode = !state.dragMode;
        if (state.dragMode) {
          state.scrollMode = false;
        }
        syncUiState();
      });

      bindTap(scrollModeBtn, () => {
        state.scrollMode = !state.scrollMode;
        if (state.scrollMode) {
          state.dragMode = false;
        }
        syncUiState();
      });

      textInput.addEventListener("compositionstart", () => {
        state.textComposing = true;
        state.lastTextInputAt = Date.now();
      });

      textInput.addEventListener("compositionend", () => {
        state.textComposing = false;
        state.lastTextInputAt = Date.now();
      });

      textInput.addEventListener("input", () => {
        state.lastTextInputAt = Date.now();
      });

      textInput.addEventListener("focus", () => {
        if (state.viewScale > 1.001) {
          resetZoom();
        }
        state.keyboardVisible = true;
        state.toolsOpen = true;
        state.uiHidden = false;
        syncUiState();
      });

      textInput.addEventListener("blur", () => {
        window.setTimeout(() => {
          if (document.activeElement !== textInput) {
            state.keyboardVisible = false;
            syncUiState();
            normalizeViewportAfterKeyboard();
          }
        }, 0);
      });

      bindTap(sendTextBtn, async () => {
        if (state.sendingText) {
          return;
        }

        await settleTextInput();
        const text = textInput.value;
        if (!text) {
          return;
        }

        state.sendingText = true;
        sendTextBtn.disabled = true;
        sendTextBtn.textContent = "Sending...";

        try {
          const ok = await sendCommand({ type: "text", text });
          if (ok) {
            textInput.value = "";
          }
        } finally {
          state.sendingText = false;
          sendTextBtn.disabled = false;
          sendTextBtn.textContent = "Send Text";
        }
      });

      document.querySelectorAll("[data-shortcut]").forEach((button) => {
        bindTap(button, () => {
          const keys = button.getAttribute("data-shortcut").split("+");
          sendCommand({ type: "shortcut", keys });
        });
      });

      document.querySelectorAll("[data-key]").forEach((button) => {
        bindTap(button, () => {
          const key = button.getAttribute("data-key");
          sendCommand({ type: "key", key });
        });
      });

      frameSurface.addEventListener("pointerdown", onPointerDown);
      window.addEventListener("pointermove", onPointerMove);
      window.addEventListener("pointerup", onPointerUp);
      window.addEventListener("pointercancel", onPointerCancel);
      frameSurface.addEventListener("touchstart", onTouchStart, { passive: false });
      frameSurface.addEventListener("touchmove", onTouchMove, { passive: false });
      frameSurface.addEventListener("touchend", onTouchEnd, { passive: false });
      frameSurface.addEventListener("touchcancel", onTouchCancel, { passive: false });
    }

    function resolveToken() {
      const url = new URL(window.location.href);
      const tokenFromQuery = url.searchParams.get("token");
      if (tokenFromQuery) {
        localStorage.setItem(TOKEN_STORAGE_KEY, tokenFromQuery);
        url.searchParams.delete("token");
        window.history.replaceState({}, "", url.toString());
        return tokenFromQuery;
      }
      return localStorage.getItem(TOKEN_STORAGE_KEY) || "";
    }

    function authHeaders() {
      return state.token ? { "X-Auth-Token": state.token } : {};
    }

    function bindTap(element, handler) {
      if (!element) {
        return;
      }

      let ignoreClickUntil = 0;

      element.addEventListener("pointerdown", (event) => {
        if (!isPrimaryActivation(event)) {
          return;
        }

        ignoreClickUntil = Date.now() + 700;
        event.preventDefault();
        event.stopPropagation();
        cancelActivePointer();
        handler(event);
      });

      element.addEventListener("click", (event) => {
        if (Date.now() < ignoreClickUntil) {
          event.preventDefault();
          event.stopPropagation();
          return;
        }

        event.preventDefault();
        event.stopPropagation();
        cancelActivePointer();
        handler(event);
      });
    }

    function isPrimaryActivation(event) {
      return event.isPrimary !== false && (event.button === undefined || event.button === 0);
    }

    function syncUiState() {
      body.classList.toggle("tools-open", state.toolsOpen && !state.uiHidden);
      body.classList.toggle("ui-hidden", state.uiHidden);
      body.classList.toggle("focus-mode", state.focusMode);
      body.classList.toggle("view-zoomed", state.viewScale > 1.001);
      body.classList.toggle("keyboard-open", state.keyboardVisible);
      toolsToggleBtn.textContent = state.toolsOpen ? "Close" : "Tools";
      uiToggleBtn.textContent = state.uiHidden ? "Show UI" : "Hide UI";
      fullscreenBtn.textContent = state.focusMode ? "Exit Fill" : "Fill Screen";
      keyboardBtn.classList.toggle("active", state.keyboardVisible);
      quickKeyboardBtn.classList.toggle("active", state.keyboardVisible);
      directModeBtn.classList.toggle("active", !state.dragMode && !state.scrollMode);
      dragModeBtn.classList.toggle("active", state.dragMode);
      scrollModeBtn.classList.toggle("active", state.scrollMode);
      showUiBtn.hidden = !state.uiHidden;
      quickKeyboardBtn.hidden = state.keyboardVisible;
      resetViewBtn.hidden = !state.keyboardVisible && state.viewScale <= 1.001;
      syncViewUi();
      exitFullscreenBtn.hidden = !state.focusMode;
      scheduleViewportLayout();
    }

    function syncViewUi() {
      const zoomLabel = `${state.viewScale.toFixed(1)}x`;
      zoomResetBtn.textContent = zoomLabel;
      quickZoomResetBtn.textContent = zoomLabel;
      zoomResetBtn.classList.toggle("active", state.viewScale > 1.001);
      quickZoomResetBtn.classList.toggle("active", state.viewScale > 1.001);
    }

    async function refreshStatus() {
      if (!state.token) {
        setConnectionState("Missing token", "Open the latest phone URL", "error");
        if (!state.frameReady) {
          showOverlay("Missing token", "Open the newest phone URL from the Windows app.");
        }
        return;
      }

      try {
        const response = await fetch("/api/status", {
          headers: authHeaders(),
          cache: "no-store"
        });

        if (response.status === 401) {
          setConnectionState("Unauthorized", "Open the latest phone URL", "error");
          if (!state.frameReady) {
            showOverlay("Unauthorized", "The saved token is no longer valid.");
          }
          return;
        }

        if (!response.ok) {
          throw new Error(`status ${response.status}`);
        }

        const payload = await response.json();
        if (payload.selected_monitor) {
          const monitor = payload.selected_monitor;
          monitorPill.className = "pill";
          monitorHint.textContent = `${monitor.name} ${monitor.width}x${monitor.height}`;
        } else {
          monitorPill.className = "pill warn";
          monitorHint.textContent = "No monitor";
        }

        if (payload.last_frame_age_ms !== null) {
          framePill.className = "pill";
          frameHint.textContent = `${payload.frame_width}x${payload.frame_height} ${payload.last_frame_age_ms}ms`;
        } else {
          framePill.className = "pill warn";
          frameHint.textContent = "No frame";
        }

        if (payload.capture_error) {
          setConnectionState("Capture", payload.capture_error, "warn");
          if (!state.frameReady) {
            showOverlay("Capture issue", payload.capture_error);
          }
        } else {
          setConnectionState("Connected", "Live", "ok");
          if (!payload.has_frame && !state.frameReady) {
            showOverlay("Waiting for frame", "The laptop is connected but has not delivered the first frame yet.");
          }
        }
      } catch (error) {
        setConnectionState("Offline", error.message, "error");
        if (!state.frameReady) {
          showOverlay("Offline", `Status request failed: ${error.message}`);
        }
      }
    }

    async function refreshFrame() {
      try {
        if (!state.token) {
          return;
        }

        const response = await fetch(`/api/frame.jpg?ts=${Date.now()}`, {
          headers: authHeaders(),
          cache: "no-store"
        });

        if (response.status === 401) {
          if (!state.frameReady) {
            showOverlay("Unauthorized", "Open the latest phone URL from the Windows app.");
          }
          return;
        }

        if (response.status === 404) {
          if (!state.frameReady) {
            showOverlay("Waiting for frame", "The server is reachable but has not provided a frame yet.");
          }
          return;
        }

        if (!response.ok) {
          throw new Error(`frame ${response.status}`);
        }

        const blob = await response.blob();
        const objectUrl = URL.createObjectURL(blob);
        if (state.frameObjectUrl) {
          URL.revokeObjectURL(state.frameObjectUrl);
        }
        state.frameObjectUrl = objectUrl;
        frameImage.src = objectUrl;
      } catch (error) {
        if (!state.frameReady) {
          showOverlay("Stream paused", `Frame request failed: ${error.message}`);
        }
      } finally {
        window.setTimeout(refreshFrame, FRAME_INTERVAL_MS);
      }
    }

    async function settleTextInput() {
      if (document.activeElement === textInput) {
        textInput.blur();
      }

      await nextFrame();

      if (state.textComposing) {
        await new Promise((resolve) => {
          let settled = false;
          let timeoutId = 0;

          const finish = () => {
            if (settled) {
              return;
            }

            settled = true;
            state.textComposing = false;
            window.clearTimeout(timeoutId);
            textInput.removeEventListener("compositionend", finish);
            resolve();
          };

          textInput.addEventListener("compositionend", finish, { once: true });
          timeoutId = window.setTimeout(finish, 180);
        });
      } else {
        await wait(40);
      }

      while (Date.now() - state.lastTextInputAt < 120) {
        await wait(24);
      }

      let previousValue = textInput.value;
      let stableFrames = 0;
      const deadline = Date.now() + 220;

      while (stableFrames < 2 && Date.now() < deadline) {
        await nextFrame();
        const currentValue = textInput.value;
        if (currentValue === previousValue) {
          stableFrames += 1;
        } else {
          previousValue = currentValue;
          stableFrames = 0;
        }
      }
    }

    async function sendCommand(body) {
      if (!state.token) {
        return false;
      }

      try {
        const response = await fetch("/api/input", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            ...authHeaders()
          },
          body: JSON.stringify(body)
        });

        return response.ok;
      } catch {
        return false;
      }
    }

    function nextFrame() {
      return new Promise((resolve) => {
        requestAnimationFrame(() => resolve());
      });
    }

    function wait(ms) {
      return new Promise((resolve) => {
        window.setTimeout(resolve, ms);
      });
    }

    function onPointerDown(event) {
      if (!state.token || !state.frameReady) {
        return;
      }

      if (
        state.touchGesture ||
        (event.pointerType === "touch" && event.isPrimary === false) ||
        (event.pointerType === "touch" && state.pointer && state.pointer.pointerId !== event.pointerId)
      ) {
        return;
      }

      if (!isScreenPointerTarget(event.target)) {
        return;
      }

      if (state.keyboardVisible) {
        dismissKeyboard(false);
        syncUiState();
      }

      event.preventDefault();
      frameSurface.setPointerCapture?.(event.pointerId);
      const point = pointFromEvent(event);
      state.pointer = {
        pointerId: event.pointerId,
        start: point,
        last: point,
        moved: false,
        startedAt: Date.now(),
        lastMoveAt: 0,
        startOffsetX: state.viewOffsetX,
        startOffsetY: state.viewOffsetY,
        scrollResidualX: 0,
        scrollResidualY: 0
      };

      if (state.dragMode) {
        sendCommand({ type: "button", x: point.x, y: point.y, button: "left", action: "press" });
      }
    }

    function onPointerMove(event) {
      if (!state.pointer || state.pointer.pointerId !== event.pointerId) {
        return;
      }

      event.preventDefault();
      const point = pointFromEvent(event);
      const moveDistance = Math.abs(point.clientX - state.pointer.start.clientX) + Math.abs(point.clientY - state.pointer.start.clientY);
      if (moveDistance > 9) {
        state.pointer.moved = true;
      }

      if (state.scrollMode) {
        const deltaX = point.clientX - state.pointer.last.clientX;
        const deltaY = point.clientY - state.pointer.last.clientY;
        state.pointer.scrollResidualX += deltaX;
        state.pointer.scrollResidualY += deltaY;
        const horizontalScroll = consumeScrollSteps(state.pointer.scrollResidualX);
        const verticalScroll = consumeScrollSteps(state.pointer.scrollResidualY);
        state.pointer.scrollResidualX -= horizontalScroll.consumed;
        state.pointer.scrollResidualY -= verticalScroll.consumed;
        state.pointer.last = point;
        if (horizontalScroll.steps || verticalScroll.steps) {
          state.pointer.moved = true;
          sendCommand({
            type: "scroll",
            horizontal: horizontalScroll.steps,
            vertical: verticalScroll.steps
          });
        }
        return;
      }

      if (canPanView()) {
        state.pointer.last = point;
        state.viewOffsetX = state.pointer.startOffsetX + (point.clientX - state.pointer.start.clientX);
        state.viewOffsetY = state.pointer.startOffsetY + (point.clientY - state.pointer.start.clientY);
        clampViewOffset();
        applyViewTransform();
        return;
      }

      const now = Date.now();
      if (state.pointer.moved && now - state.pointer.lastMoveAt >= MOVE_INTERVAL_MS) {
        state.pointer.lastMoveAt = now;
        state.pointer.last = point;
        sendCommand({ type: "move", x: point.x, y: point.y });
      }
    }

    function onPointerUp(event) {
      if (!state.pointer || state.pointer.pointerId !== event.pointerId) {
        return;
      }

      event.preventDefault();
      const point = pointFromEvent(event);
      const heldFor = Date.now() - state.pointer.startedAt;

      if (state.scrollMode) {
        releaseTrackedPointer(event.pointerId);
        state.pointer = null;
        return;
      }

      if (state.dragMode) {
        sendCommand({ type: "button", x: point.x, y: point.y, button: "left", action: "release" });
        releaseTrackedPointer(event.pointerId);
        state.pointer = null;
        return;
      }

      if (canPanView() && state.pointer.moved) {
        releaseTrackedPointer(event.pointerId);
        state.pointer = null;
        return;
      }

      if (!state.pointer.moved && heldFor >= LONG_PRESS_MS) {
        sendCommand({ type: "click", x: point.x, y: point.y, button: "right", count: 1 });
      } else if (!state.pointer.moved) {
        sendCommand({ type: "click", x: point.x, y: point.y, button: "left", count: 1 });
      } else {
        sendCommand({ type: "move", x: point.x, y: point.y });
      }

      releaseTrackedPointer(event.pointerId);
      state.pointer = null;
    }

    function onTouchStart(event) {
      if (!isScreenPointerTarget(event.target) || event.touches.length < 2) {
        return;
      }

      if (state.keyboardVisible) {
        dismissKeyboard(false);
        syncUiState();
      }

      event.preventDefault();
      beginTouchGesture(event.touches);
    }

    function onTouchMove(event) {
      if (!state.touchGesture) {
        return;
      }

      if (event.touches.length < 2) {
        endTouchGesture();
        return;
      }

      event.preventDefault();
      updateTouchGesture(event.touches);
    }

    function onTouchEnd(event) {
      if (!state.touchGesture) {
        return;
      }

      event.preventDefault();
      if (event.touches.length >= 2) {
        updateTouchGesture(event.touches);
        return;
      }

      endTouchGesture();
    }

    function onTouchCancel(event) {
      if (!state.touchGesture) {
        return;
      }

      event.preventDefault();
      endTouchGesture();
    }

    function onPointerCancel(event) {
      if (!state.pointer || state.pointer.pointerId !== event.pointerId) {
        return;
      }

      if (state.dragMode) {
        const point = pointFromEvent(event);
        sendCommand({ type: "button", x: point.x, y: point.y, button: "left", action: "release" });
      }

      releaseTrackedPointer(event.pointerId);
      state.pointer = null;
    }

    function pointFromEvent(event) {
      const rect = getInteractiveRect();
      const width = rect.width || 1;
      const height = rect.height || 1;
      return {
        x: clamp((event.clientX - rect.left) / width, 0, 1),
        y: clamp((event.clientY - rect.top) / height, 0, 1),
        clientX: event.clientX,
        clientY: event.clientY
      };
    }

    function getInteractiveRect() {
      const imageRect = frameImage.getBoundingClientRect();
      if (imageRect.width > 8 && imageRect.height > 8) {
        return imageRect;
      }
      return frameSurface.getBoundingClientRect();
    }

    function isScreenPointerTarget(target) {
      return Boolean(
        target === frameSurface ||
        target?.closest?.(".screen-wrap")
      );
    }

    function cancelActivePointer() {
      if (!state.pointer) {
        return;
      }

      if (state.dragMode) {
        const point = state.pointer.last || state.pointer.start;
        sendCommand({ type: "button", x: point.x, y: point.y, button: "left", action: "release" });
      }

      releaseTrackedPointer(state.pointer.pointerId);
      state.pointer = null;
    }

    function dismissKeyboard(closeTools) {
      state.keyboardVisible = false;
      if (closeTools) {
        state.toolsOpen = false;
      }

      if (document.activeElement === textInput) {
        textInput.blur();
      }

      normalizeViewportAfterKeyboard();
    }

    function focusTextInput() {
      toolsSheet.scrollTop = 0;
      toolsSheet.getBoundingClientRect();
      textInput.scrollIntoView({ block: "start", inline: "nearest" });
      textInput.focus();
      textInput.click();
      const cursor = textInput.value.length;
      textInput.setSelectionRange(cursor, cursor);
    }

    function toggleKeyboard() {
      if (state.keyboardVisible) {
        dismissKeyboard(true);
        syncUiState();
        return;
      }

      if (state.viewScale > 1.001) {
        resetZoom();
      }

      state.uiHidden = false;
      state.toolsOpen = true;
      state.keyboardVisible = true;
      syncUiState();
      focusTextInput();
    }

    function toggleFocusMode(forceValue) {
      state.focusMode = typeof forceValue === "boolean" ? forceValue : !state.focusMode;
      dismissKeyboard(false);
      if (state.focusMode) {
        state.uiHidden = true;
        state.toolsOpen = false;
        state.keyboardVisible = false;
        requestBrowserFullscreen();
      } else {
        state.uiHidden = false;
        exitBrowserFullscreen();
      }
      syncUiState();
      clampViewOffset();
      applyViewTransform();
    }

    function requestBrowserFullscreen() {
      const element = document.documentElement;
      if (document.fullscreenElement || !element.requestFullscreen) {
        return;
      }
      element.requestFullscreen().catch(() => {});
    }

    function exitBrowserFullscreen() {
      if (document.fullscreenElement && document.exitFullscreen) {
        document.exitFullscreen().catch(() => {});
      }
    }

    function zoomBy(delta) {
      state.viewScale = clamp(Number((state.viewScale + delta).toFixed(2)), 1, 4);
      if (state.viewScale <= 1.001) {
        state.viewScale = 1;
        state.viewOffsetX = 0;
        state.viewOffsetY = 0;
      }
      clampViewOffset();
      applyViewTransform();
      syncUiState();
    }

    function resetZoom() {
      state.viewScale = 1;
      state.viewOffsetX = 0;
      state.viewOffsetY = 0;
      applyViewTransform();
      syncUiState();
    }

    function restoreDefaultView() {
      dismissKeyboard(false);
      state.uiHidden = false;
      resetZoom();
      window.scrollTo(0, 0);
      scheduleViewportLayout();
    }

    function canPanView() {
      return state.viewScale > 1.001 && !state.dragMode && !state.scrollMode;
    }

    function clampViewOffset() {
      const baseWidth = frameImage.offsetWidth || 0;
      const baseHeight = frameImage.offsetHeight || 0;
      if (!baseWidth || !baseHeight || state.viewScale <= 1.001) {
        state.viewOffsetX = 0;
        state.viewOffsetY = 0;
        return;
      }

      const maxOffsetX = ((baseWidth * state.viewScale) - baseWidth) / 2;
      const maxOffsetY = ((baseHeight * state.viewScale) - baseHeight) / 2;
      state.viewOffsetX = clamp(state.viewOffsetX, -maxOffsetX, maxOffsetX);
      state.viewOffsetY = clamp(state.viewOffsetY, -maxOffsetY, maxOffsetY);
    }

    function scheduleViewportLayout() {
      if (viewportLayoutFrame) {
        return;
      }

      viewportLayoutFrame = requestAnimationFrame(() => {
        viewportLayoutFrame = 0;
        updateViewportLayout();
      });
    }

    function updateViewportLayout() {
      const viewerRect = frameSurface.getBoundingClientRect();
      if (!viewerRect.width || !viewerRect.height) {
        return;
      }

      const topInset = measureOverlayInset(hudTop, viewerRect, "top");
      const hudBottomInset = measureOverlayInset(hudBottom, viewerRect, "bottom");
      const returnDockOffset = hudBottomInset > 0 ? hudBottomInset + 8 : 0;
      frameSurface.style.setProperty(
        "--return-dock-stack-offset",
        `${Math.ceil(returnDockOffset)}px`
      );
      const bottomInset = Math.max(
        hudBottomInset,
        measureOverlayInset(returnDock, viewerRect, "bottom")
      );

      frameSurface.style.setProperty("--viewer-top-inset", `${Math.ceil(topInset)}px`);
      frameSurface.style.setProperty("--viewer-bottom-inset", `${Math.ceil(bottomInset)}px`);
      clampViewOffset();
      applyViewTransform();
    }

    function measureOverlayInset(element, containerRect, edge) {
      if (!element || !element.getClientRects().length) {
        return 0;
      }

      const rect = element.getBoundingClientRect();
      if (edge === "top") {
        return Math.max(0, rect.bottom - containerRect.top);
      }

      return Math.max(0, containerRect.bottom - rect.top);
    }

    function applyViewTransform() {
      screenPan.style.transform = `translate3d(${state.viewOffsetX}px, ${state.viewOffsetY}px, 0)`;
      frameImage.style.transform = `scale(${state.viewScale})`;
    }

    function beginTouchGesture(touches) {
      const [firstTouch, secondTouch] = Array.from(touches).slice(0, 2);
      if (!firstTouch || !secondTouch) {
        return;
      }

      cancelActivePointer();
      const startMidpoint = midpointFromTouches(firstTouch, secondTouch);
      state.touchGesture = {
        startDistance: Math.max(touchDistance(firstTouch, secondTouch), 1),
        startScale: state.viewScale,
        startOffsetX: state.viewOffsetX,
        startOffsetY: state.viewOffsetY,
        startMidpointX: startMidpoint.relativeX,
        startMidpointY: startMidpoint.relativeY
      };
    }

    function updateTouchGesture(touches) {
      if (!state.touchGesture) {
        return;
      }

      const [firstTouch, secondTouch] = Array.from(touches).slice(0, 2);
      if (!firstTouch || !secondTouch) {
        return;
      }

      const distance = Math.max(touchDistance(firstTouch, secondTouch), 1);
      const midpoint = midpointFromTouches(firstTouch, secondTouch);
      const nextScale = clamp(
        Number(((state.touchGesture.startScale * distance) / state.touchGesture.startDistance).toFixed(2)),
        1,
        4
      );

      state.viewScale = nextScale <= 1.001 ? 1 : nextScale;
      if (state.viewScale === 1) {
        state.viewOffsetX = 0;
        state.viewOffsetY = 0;
      } else {
        const scaleFactor = state.viewScale / state.touchGesture.startScale;
        state.viewOffsetX =
          midpoint.relativeX -
          ((state.touchGesture.startMidpointX - state.touchGesture.startOffsetX) * scaleFactor);
        state.viewOffsetY =
          midpoint.relativeY -
          ((state.touchGesture.startMidpointY - state.touchGesture.startOffsetY) * scaleFactor);
        clampViewOffset();
      }

      applyViewTransform();
      syncViewUi();
    }

    function endTouchGesture() {
      state.touchGesture = null;
      clampViewOffset();
      applyViewTransform();
      syncViewUi();
    }

    function normalizeViewportAfterKeyboard() {
      window.scrollTo(0, 0);
      document.documentElement.scrollTop = 0;
      document.body.scrollTop = 0;
      scheduleViewportLayout();
      window.setTimeout(() => {
        window.scrollTo(0, 0);
        scheduleViewportLayout();
      }, 180);
    }

    function showOverlay(title, message) {
      overlayTitle.textContent = title;
      overlayMessage.textContent = message;
      frameOverlay.classList.remove("hidden");
    }

    function setConnectionState(title, subtitle, kind) {
      connectionPill.className = `pill ${kind || ""}`.trim();
      connectionPill.querySelector("strong").textContent = title;
      connectionHint.textContent = subtitle;
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function midpointFromTouches(firstTouch, secondTouch) {
      const rect = screenWrap?.getBoundingClientRect() || frameSurface.getBoundingClientRect();
      const clientX = (firstTouch.clientX + secondTouch.clientX) / 2;
      const clientY = (firstTouch.clientY + secondTouch.clientY) / 2;
      return {
        clientX,
        clientY,
        relativeX: clientX - (rect.left + rect.width / 2),
        relativeY: clientY - (rect.top + rect.height / 2)
      };
    }

    function touchDistance(firstTouch, secondTouch) {
      return Math.hypot(
        secondTouch.clientX - firstTouch.clientX,
        secondTouch.clientY - firstTouch.clientY
      );
    }

    function consumeScrollSteps(delta) {
      const magnitude = Math.abs(delta);
      if (magnitude < SCROLL_START_PX) {
        return { steps: 0, consumed: 0 };
      }

      const sign = Math.sign(delta);
      const extraMagnitude = magnitude - SCROLL_START_PX;
      const steps = 1 + Math.floor(extraMagnitude / SCROLL_STEP_PX);
      const consumed = sign * (SCROLL_START_PX + Math.max(0, steps - 1) * SCROLL_STEP_PX);
      return {
        steps: sign * steps,
        consumed
      };
    }

    function releaseTrackedPointer(pointerId) {
      if (pointerId === undefined) {
        return;
      }

      if (frameSurface.hasPointerCapture?.(pointerId)) {
        frameSurface.releasePointerCapture(pointerId);
      }
    }
  </script>
</body>
</html>
