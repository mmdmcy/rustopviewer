name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Linux capture dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libpipewire-0.3-dev libgbm-dev libclang-dev clang

      - name: Format
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --all-targets

      - name: Test
        run: cargo test --all-targets
